name: Deploy Application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Your generated configuration will be inserted below
      - name: Fetch secrets from vault
        id: fetch-secrets
        uses: EntrustCorporation/secrets-vault-action@v1
        with:
          base_url: https://10.1.228.68/
          auth_type: 'userpass'
          username: ${{secrets.VAULT_USERNAME}}
          password: ${{sectets.VAULT_PASSWORD}}
          vault_uid: ${{sectets.VAULT_UID}}
          secrets: |
            BOX.DOCKER_PASSWORD | DOCKER_PASSWORD;
            BOX.DOCKER_USERNAME | DOCKER_USERNAME;


      # Example of how to use the fetched secrets
      - name: Use secrets
        run: |
          echo "Using secrets in your workflow"
          # Access as environment variables
          echo "Running with API from $DB_PASSWORD"
          
          # Or access as outputs
          echo "API Key is masked: ${{ steps.fetch-secrets.outputs.API_KEY }}"

# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.
